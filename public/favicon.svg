<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#000"/>
  
  <!-- Mountain/Triangle outline -->
  <path d="M 40 140 L 100 50 L 160 140 Z" stroke="#FFF" stroke-width="6" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Upward Arrow -->
  <g transform="translate(100, 95)">
    <!-- Arrow shaft -->
    <rect x="-4" y="-20" width="8" height="35" fill="#FFF" rx="2"/>
    <!-- Arrow head -->
    <polygon points="0,-20 -12,-5 -6,-5 -6,15 6,15 6,-5 12,-5" fill="#FFF"/>
  </g>
</svg>
