<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="#000"/>
  
  <!-- Mountain/Triangle outline -->
  <path d="M 50 210 L 150 60 L 250 210 Z" stroke="#FFF" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Upward Arrow -->
  <g transform="translate(150, 140)">
    <!-- Arrow shaft -->
    <rect x="-6" y="-30" width="12" height="50" fill="#FFF" rx="3"/>
    <!-- Arrow head -->
    <polygon points="0,-30 -18,-8 -10,-8 -10,20 10,20 10,-8 18,-8" fill="#FFF"/>
  </g>
</svg>
